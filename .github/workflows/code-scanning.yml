name: Code Scanning

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 1 * * *' # Runs daily at 1 AM

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      # Step 1: Authenticate with npm for private packages
      - name: Authenticate with npm
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      # Step 2: Authenticate with PyPI for private Python packages
      - name: Authenticate with PyPI
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          mkdir -p ~/.config/pip
          echo "[global]" > ~/.config/pip/pip.conf
          echo "extra-index-url=https://__token__:${PYPI_TOKEN}@pypi.org/simple" >> ~/.config/pip/pip.conf

      # Step 3: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 4: Initialize CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: |
            javascript
            typescript
            python
            java
            kotlin
            c
            cpp
            go
            ruby
            csharp
          # Optional: Use custom configuration
          config-file: codeql-config.yml

      # Step 5: Perform CodeQL Analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
